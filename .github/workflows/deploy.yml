# Deploys the static site to GitHub Pages, injecting Supabase credentials
# from repository secrets at build time so config.js never lives in the
# repository.
#
# One-time setup (you do these in the GitHub UI):
#   1. Repo Settings -> Secrets and variables -> Actions -> New secret
#        Name: SUPABASE_URL
#        Value: https://ynidxlgvnbiygpybafmm.supabase.co
#      Then add a second secret:
#        Name: SUPABASE_ANON_KEY
#        Value: <your anon JWT>
#   2. Repo Settings -> Pages -> "Source" -> "GitHub Actions"
#      (currently it is likely "Deploy from a branch"; change it.)
#
# Once those are set, every push to main triggers this workflow and the
# new deployment carries a freshly generated config.js with your secrets.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::Repository secrets SUPABASE_URL and SUPABASE_ANON_KEY are not set."
            exit 1
          fi
          mkdir -p _site
          # Whitelist only the files that should be served by Pages —
          # avoids leaking stray local files (editor copies, .claude/, etc.).
          cp index.html _site/
          cat > _site/config.js <<EOF
          // Generated by GitHub Actions deploy workflow.
          // Values come from repository secrets — do not edit by hand.
          window.SUPABASE_URL      = "${SUPABASE_URL}";
          window.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
