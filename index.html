<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sporton · 專案追蹤 / Project Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    /* Sporton palette – derived from the source Excel */
    --header-brown: #8B4513;
    --terracotta: #c65d3d;
    --terracotta-dark: #a8462a;
    --ink: #2b1e17;
    --ink-2: #4a3a2f;
    --cream: #fbf6ef;
    --sand: #f5ede3;
    --line: #e4d6c7;
    --muted: #7a6a5f;

    /* The five legend colors – pulled verbatim from Project Status.xlsx */
    --s-progress-bg:#E8A87C;  --s-progress-fg:#4A2010;  /* 進行中  */
    --s-ok-bg:      #F2D5B8;  --s-ok-fg:      #4A2010;  /* OK       */
    --s-pending-bg: #E8C9A0;  --s-pending-fg: #4A2010;  /* Pending  */
    --s-delay-bg:   #E07040;  --s-delay-fg:   #FFFFFF;  /* Delay    */
    --s-fail-bg:    #8B2500;  --s-fail-fg:    #FFF5EE;  /* Fail     */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Microsoft JhengHei', -apple-system, system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 13px;
    line-height: 1.45;
  }
  .container { padding: 20px 24px 60px; }

  /* ---------- Hero ---------- */
  .hero {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px; margin-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--terracotta);
    box-shadow: 0 0 0 4px rgba(198,93,61,.15);
  }
  .brand-text {
    color: var(--terracotta); font-size: 11px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  h1 { margin: 4px 0 0; font-size: 22px; font-weight: 600; color: var(--ink); }
  h1 .en { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 6px; }

  /* ---------- Summary chips ---------- */
  .summary { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    border: 1px solid transparent;
  }
  .chip .num { font-size: 14px; }
  .chip.total { background: #fff; color: var(--ink); border-color: var(--line); }
  .chip.s-progress{ background: var(--s-progress-bg);color: var(--s-progress-fg); }
  .chip.s-ok      { background: var(--s-ok-bg);      color: var(--s-ok-fg); }
  .chip.s-pending { background: var(--s-pending-bg); color: var(--s-pending-fg); }
  .chip.s-delay   { background: var(--s-delay-bg);   color: var(--s-delay-fg); }
  .chip.s-fail    { background: var(--s-fail-bg);    color: var(--s-fail-fg); }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    background: transparent; border: 1px solid transparent;
    border-bottom: none; padding: 9px 18px;
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-radius: 8px 8px 0 0; margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--terracotta); }
  .tab.active {
    background: #fff; color: var(--ink);
    border-color: var(--line); border-bottom-color: #fff;
  }
  .tab .tab-count {
    background: var(--sand); color: var(--ink-2);
    padding: 1px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }
  .tab.active .tab-count { background: var(--terracotta); color: #fff; }

  /* ---------- Legend ---------- */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    padding: 10px 14px; margin-bottom: 12px;
    background: var(--sand); border: 1px solid var(--line); border-radius: 12px;
    font-size: 12px;
  }
  .legend .l-title {
    font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em; font-size: 11px;
  }
  .legend .swatch { display: inline-flex; align-items: center; gap: 6px; }
  .legend .sq {
    display: inline-block; width: 16px; height: 16px;
    border-radius: 4px; border: 1px solid rgba(0,0,0,.1);
  }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 12px 14px; margin-bottom: 12px;
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
  }
  .toolbar input[type=text],
  .toolbar select {
    padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px;
    background: #fff; font: inherit; color: var(--ink);
  }
  .toolbar input[type=text]:focus,
  .toolbar select:focus {
    outline: none; border-color: var(--terracotta);
    box-shadow: 0 0 0 3px rgba(198,93,61,.15);
  }
  .toolbar input.search { min-width: 240px; flex: 1 1 240px; }
  .toolbar label.lbl {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
  }
  .toolbar .spacer { flex: 1 1 auto; }
  .btn {
    padding: 7px 14px; border: 1px solid var(--line); background: #fff;
    color: var(--ink); border-radius: 8px;
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all .12s;
  }
  .btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .btn.primary {
    background: var(--terracotta); color: #fff; border-color: var(--terracotta);
  }
  .btn.primary:hover {
    background: var(--terracotta-dark); border-color: var(--terracotta-dark); color: #fff;
  }

  /* ---------- Table ---------- */
  .table-wrap {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    overflow: auto; max-height: calc(100vh - 320px);
  }
  table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 12.5px;
  }
  thead th {
    position: sticky; top: 0; z-index: 3;
    background: var(--header-brown); color: #FFFFFF;
    text-align: center; padding: 10px 8px;
    font-weight: 700; white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,.12);
    border-bottom: 2px solid var(--terracotta);
    user-select: none; cursor: pointer;
  }
  thead th.no-sort { cursor: default; }
  thead th .en {
    display: block; font-weight: 400; font-size: 10.5px;
    color: #f0d8c0; letter-spacing: .03em; margin-top: 2px;
  }
  thead th .arrow { color: #ffd9b8; margin-left: 4px; font-size: 10px; }
  thead th.test-col { background: var(--header-brown); }

  tbody td {
    padding: 8px 8px; border-bottom: 1px solid var(--line);
    border-right: 1px solid #f1e6d8;
    vertical-align: middle; color: var(--ink); background: #fff;
    text-align: center; white-space: nowrap;
  }
  tbody td.editable:hover {
    outline: 2px solid rgba(198,93,61,.25); outline-offset: -2px; cursor: text;
    background: #fff7ed;
  }
  tbody td.editable:focus {
    outline: 2px solid var(--terracotta); outline-offset: -2px;
    background: #fff !important; text-align: left;
  }
  tbody td.notes {
    min-width: 240px; max-width: 320px;
    white-space: pre-wrap; text-align: left;
  }
  tbody td.col-no { width: 44px; color: var(--muted); }
  tbody td.col-case { width: 110px; font-weight: 700; text-align: left; }
  tbody td.col-action { width: 108px; white-space: nowrap; }
  tbody td.col-action .row-btn + .row-btn { margin-left: 4px; }

  /* test-status cell */
  tbody td.test-cell {
    padding: 4px;
    width: 84px;
    cursor: pointer;
    position: relative;
  }
  .pill {
    display: block; width: 100%;
    padding: 5px 4px;
    border-radius: 6px;
    font-size: 11.5px; font-weight: 700;
    text-align: center;
    border: 1px solid transparent;
    color: var(--muted);
  }
  .pill.empty {
    background: #faf2e6; border-color: var(--line); color: #b8a896;
    font-weight: 500;
  }
  .pill.s-progress{ background: var(--s-progress-bg);color: var(--s-progress-fg); }
  .pill.s-ok      { background: var(--s-ok-bg);      color: var(--s-ok-fg); }
  .pill.s-pending { background: var(--s-pending-bg); color: var(--s-pending-fg); }
  .pill.s-delay   { background: var(--s-delay-bg);   color: var(--s-delay-fg); }
  .pill.s-fail    { background: var(--s-fail-bg);    color: var(--s-fail-fg); }
  tbody td.test-cell:hover .pill {
    box-shadow: 0 0 0 2px rgba(198,93,61,.35);
  }

  .row-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--muted); padding: 4px 8px; border-radius: 6px;
    font: inherit; font-size: 11px; cursor: pointer;
  }
  .row-btn:hover {
    border-color: var(--terracotta); color: var(--terracotta);
  }
  .row-btn.archive:hover {
    background: rgba(198,93,61,.08);
    border-color: var(--terracotta); color: var(--terracotta);
  }
  .row-btn.restore:hover {
    background: rgba(74,160,80,.08);
    border-color: #4a8a55; color: #2f6b3a;
  }
  .row-btn.del:hover {
    background: rgba(139,37,0,.08);
    border-color: var(--s-fail-bg); color: var(--s-fail-bg);
  }

  .empty-row td {
    padding: 30px; text-align: center;
    color: var(--muted); font-style: italic;
  }
  footer {
    margin-top: 16px; color: var(--muted);
    font-size: 11px; text-align: center;
  }

  /* ---------- Status popover ---------- */
  .pop-mask {
    position: fixed; inset: 0; z-index: 50; background: transparent;
  }
  .pop {
    position: absolute; z-index: 51;
    background: #fff; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,.18);
    width: 220px;
  }
  .pop h4 {
    margin: 0 0 8px; font-size: 11px; font-weight: 700;
    color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
  }
  .pop-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px;
  }
  .pop-grid button {
    padding: 7px 4px; border-radius: 6px;
    font: inherit; font-size: 11.5px; font-weight: 700;
    border: 1px solid transparent; cursor: pointer; text-align: center;
  }
  .pop-grid button.s-progress{ background: var(--s-progress-bg);color: var(--s-progress-fg); }
  .pop-grid button.s-ok      { background: var(--s-ok-bg);      color: var(--s-ok-fg); }
  .pop-grid button.s-pending { background: var(--s-pending-bg); color: var(--s-pending-fg); }
  .pop-grid button.s-delay   { background: var(--s-delay-bg);   color: var(--s-delay-fg); }
  .pop-grid button.s-fail    { background: var(--s-fail-bg);    color: var(--s-fail-fg); }
  .pop-grid button:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .pop-grid button.clear {
    grid-column: 1 / -1;
    background: #fff; color: var(--muted); border: 1px dashed var(--line);
  }
  .pop-grid button.clear:hover { color: var(--ink); border-color: var(--muted); }

  @media (max-width: 1100px) {
    .hero { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="hero">
    <div>
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-text">Sporton International</span>
      </div>
      <h1>專案追蹤<span class="en">Project Tracker</span></h1>
    </div>
    <div class="summary" id="summary"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="active">
      現行專案 Active <span class="tab-count" id="count-active">0</span>
    </button>
    <button class="tab" data-view="archive">
      封存 Archive <span class="tab-count" id="count-archive">0</span>
    </button>
  </nav>

  <div class="legend" id="legend"></div>

  <div class="toolbar">
    <input type="text" class="search" id="search"
           placeholder="搜尋 Search · 案號 / 客戶 / 產品名稱 / 業務" />
    <label class="lbl">狀態 Status</label>
    <select id="status-filter">
      <option value="">全部 All</option>
    </select>
    <label class="lbl">項目 Item</label>
    <select id="item-filter">
      <option value="">全部 All</option>
    </select>
    <span class="spacer"></span>
    <button class="btn primary" id="add-row">+ 新增 Add</button>
    <button class="btn" id="export-csv">⬇ 匯出 Export CSV</button>
    <button class="btn" id="import-csv">⬆ 匯入 Import CSV</button>
    <input type="file" id="file-input" accept=".csv" hidden />
  </div>

  <div class="table-wrap">
    <table id="tracker">
      <thead><tr id="head-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer>
    Sporton Internal · 資料儲存於 Supabase 雲端資料庫 · Cloud-synced via Supabase
    · <span style="opacity:.6">build 2026-05-13-a</span>
  </footer>
</div>

<script>
/* ============================================================
   Sporton 專案追蹤 / Project Tracker
   Data layer: Supabase (replaces localStorage)
   ============================================================ */

const SUPABASE_URL = 'https://ynidxlgvnbiygpybafmm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluaWR4bGd2bmJpeWdweWJhZm1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjU2NzksImV4cCI6MjA5NDEwMTY3OX0.muGk19RMx1qH3TXlmSs-VhSX3YsRzcYvElmmTaj3LuQ';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* The five statuses from the Excel legend row. */
const STATUSES = [
  { id: 'progress', label: '進行中',  en: 'In Progress', cls: 's-progress' },
  { id: 'ok',       label: 'OK',      en: 'OK',          cls: 's-ok' },
  { id: 'pending',  label: 'Pending', en: 'Pending',     cls: 's-pending' },
  { id: 'delay',    label: 'Delay',   en: 'Delay',       cls: 's-delay' },
  { id: 'fail',     label: 'Fail',    en: 'Fail',        cls: 's-fail' }
];

/* Left side – text / metadata columns. */
const META_COLS = [
  { key: 'no',      zh: '編號',         en: 'No.',        sortable: true,  edit: false, cls: 'col-no' },
  { key: 'case',    zh: '案號',         en: 'Case No.',   sortable: true,  edit: true,  cls: 'col-case' },
  { key: 'client',  zh: '客戶',         en: 'Client',     sortable: true,  edit: true,  cls: '' },
  { key: 'product', zh: '產品名稱',     en: 'Product',    sortable: true,  edit: true,  cls: '' },
  { key: 'model',   zh: '產品型號',     en: 'Model',      sortable: true,  edit: true,  cls: '' },
  { key: 'sales',   zh: '業務',         en: 'Sales',      sortable: true,  edit: true,  cls: '' },
  { key: 'sample',  zh: '樣品接收時間', en: 'Sample Recv',sortable: true,  edit: true,  cls: '' },
  { key: 'country', zh: '國別',         en: 'Country',    sortable: true,  edit: true,  cls: '' },
  { key: 'note',    zh: '狀態',         en: 'Status Note',sortable: false, edit: true,  cls: 'notes' }
];

/* Right side – 11 independent test/document status columns from the Excel. */
const TEST_COLS = [
  { key: 'ems',   zh: 'EMS',   en: 'EMS' },
  { key: 'rf',    zh: 'RF',    en: 'RF' },
  { key: 'ep',    zh: 'EP',    en: 'EP' },
  { key: 'emi',   zh: 'EMI',   en: 'EMI' },
  { key: 'pjf',   zh: 'PJF',   en: 'PJF' },
  { key: 'trf',   zh: 'TRF',   en: 'TRF' },
  { key: 'ft',    zh: 'FT',    en: 'FT' },
  { key: 'dd',    zh: 'DD',    en: 'DD' },
  { key: 'draft', zh: 'DRAFT', en: 'Draft' },
  { key: 'final', zh: 'FINAL', en: 'Final' },
  { key: 'cer',   zh: 'CER',   en: 'Cer' }
];

const ACTION_COL = { key: '_action', zh: '操作', en: 'Action', sortable: false, cls: 'col-action no-sort' };

/* Seed data — the five cases present in Project Status.xlsx. */
const SAMPLE = [
  { no:1, case:'641411',    client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'wifi ok， bt halow 無法一起，setup 要用 winbox',
    cells:{}, archived:false },
  { no:2, case:'350940-01', client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'', cells:{}, archived:false },
  { no:3, case:'TE622521',  client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'', cells:{}, archived:false },
  { no:4, case:'631148',    client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'', cells:{}, archived:false },
  { no:5, case:'3N2221-05', client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'', cells:{}, archived:false }
];

/* ---------- state ---------- */
let rows = [];
let view = 'active';
let searchTerm = '';
let statusFilter = '';
let itemFilter = '';
let sortKey = 'no';
let sortDir = 'asc';

/* ============================================================
   Supabase data layer  (replaces localStorage save/loadRows)
   ============================================================ */

/* Map a local row object to a flat DB record. */
function toDb(r) {
  return {
    id:       r.id,
    no:       r.no,
    case:     r.case    || '',
    client:   r.client  || '',
    product:  r.product || '',
    model:    r.model   || '',
    sales:    r.sales   || '',
    sample:   r.sample  || '',
    country:  r.country || '',
    note:     r.note    || '',
    cells:    r.cells   || {},
    archived: r.archived || false
  };
}

/* Surface DB errors visibly. Common cause: missing RLS policy on the
   `projects` table for the operation that just failed. */
function reportDbError(op, error) {
  console.error(`[Supabase ${op}]`, error);
  const hint = (error && (error.code === '42501' || /row-?level security|RLS|policy/i.test(error.message || '')))
    ? '\n\n可能原因 Likely cause: Supabase 的 `projects` 資料表沒有允許此操作的 RLS Policy。\n請至 Supabase Dashboard → Authentication → Policies，為 projects 新增允許此操作的 policy（或將該表的 RLS 關掉）。'
    : '';
  alert(`⚠ Supabase ${op} 失敗 / failed:\n${(error && error.message) || error}${hint}`);
}

async function dbLoad() {
  const { data, error } = await db.from('projects').select('*').order('no');
  if (error) { reportDbError('SELECT', error); return []; }
  return data || [];
}

async function dbUpsert(r) {
  if (!r.id) r.id = crypto.randomUUID();
  const { error } = await db.from('projects').upsert(toDb(r));
  if (error) { reportDbError('UPSERT', error); return { ok: false, error }; }
  return { ok: true };
}

async function dbDelete(id) {
  if (!id) return { ok: false, error: { message: '此筆紀錄沒有 id，可能未存到雲端 / Row has no cloud id.' } };
  console.log('[dbDelete] sending DELETE for id =', id);
  const { data, error } = await db.from('projects').delete().eq('id', id).select();
  console.log('[dbDelete] result:', { data, error });
  if (error) { reportDbError('DELETE', error); return { ok: false, error }; }
  /* Supabase returns the deleted rows when .select() is chained.
     If the array is empty, RLS likely filtered it out silently. */
  if (!data || data.length === 0) {
    const err = { message: '刪除指令送出了，但伺服器回報「0 筆受影響」。通常代表 RLS Policy 沒有允許 DELETE。\nServer reported 0 rows affected — usually means your DELETE RLS policy doesn\'t match this row.' };
    reportDbError('DELETE', err);
    return { ok: false, error: err };
  }
  return { ok: true };
}

/* Used by CSV import: wipe table then bulk-insert fresh rows. */
async function dbReplaceAll(newRows) {
  const { error: delErr } = await db.from('projects').delete().not('id', 'is', null);
  if (delErr) { reportDbError('DELETE (replace-all)', delErr); return []; }
  const inserts = newRows.map(r => toDb({ ...r, id: crypto.randomUUID() }));
  const { data, error } = await db.from('projects').insert(inserts).select();
  if (error) { reportDbError('INSERT (replace-all)', error); return []; }
  return data || inserts;
}

/* ---------- helpers ---------- */
function normalize(arr) {
  const validIds = new Set(STATUSES.map(s => s.id));
  return arr.map(r => {
    if (!r.cells) r.cells = {};
    TEST_COLS.forEach(c => {
      const v = r.cells[c.key];
      if (v && (!v.status || !validIds.has(v.status))) r.cells[c.key] = null;
      else if (v == null) r.cells[c.key] = null;
    });
    if (typeof r.archived !== 'boolean') r.archived = false;
    return r;
  });
}

const statusById = id => STATUSES.find(s => s.id === id);

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function nextNo() {
  return rows.reduce((m, r) => Math.max(m, +r.no || 0), 0) + 1;
}

/* a "cell" is null (empty) or { status: 'progress' | 'ok' | 'pending' | 'delay' | 'fail' } */
function cellClass(cell) {
  if (!cell || !cell.status) return 'empty';
  return statusById(cell.status)?.cls || 'empty';
}
function cellLabel(cell) {
  if (!cell || !cell.status) return '–';
  return statusById(cell.status)?.label || '';
}

/* ============================================================
   Render
   ============================================================ */
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = `<span class="l-title">狀態色票 Status Legend</span>` +
    STATUSES.map(s =>
      `<span class="swatch">
         <span class="sq" style="background:var(--${s.cls}-bg)"></span>
         ${escapeHtml(s.label)} <span style="color:var(--muted)">${escapeHtml(s.en)}</span>
       </span>`
    ).join('');
}

function renderFilters() {
  const sf = document.getElementById('status-filter');
  sf.innerHTML = `<option value="">全部 All</option>` +
    STATUSES.map(s => `<option value="${s.id}" ${statusFilter===s.id?'selected':''}>${escapeHtml(s.label)}</option>`).join('');
  const ifl = document.getElementById('item-filter');
  ifl.innerHTML = `<option value="">全部 All</option>` +
    TEST_COLS.map(c => `<option value="${c.key}" ${itemFilter===c.key?'selected':''}>${escapeHtml(c.zh)}</option>`).join('');
}

function renderHead() {
  const tr = document.getElementById('head-row');
  const allCols = [...META_COLS, ...TEST_COLS.map(c => ({ ...c, sortable: false, cls: 'test-col no-sort' })), ACTION_COL];
  tr.innerHTML = allCols.map(col => {
    const arrow = col.sortable && sortKey === col.key
      ? `<span class="arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>` : '';
    const cls = (col.cls || '') + (col.sortable ? '' : ' no-sort');
    return `<th class="${cls}" data-key="${col.key}">
      ${escapeHtml(col.zh)}${arrow}<span class="en">${escapeHtml(col.en)}</span>
    </th>`;
  }).join('');
  tr.querySelectorAll('th').forEach(th => {
    const key = th.dataset.key;
    const col = META_COLS.find(c => c.key === key);
    if (!col || !col.sortable) return;
    th.addEventListener('click', () => {
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = 'asc'; }
      render();
    });
  });
}

function renderSummary() {
  const scoped = rows.filter(r => view === 'archive' ? r.archived : !r.archived);
  const counts = {};
  STATUSES.forEach(s => counts[s.id] = 0);
  scoped.forEach(r => TEST_COLS.forEach(c => {
    const v = r.cells[c.key];
    if (v && v.status) counts[v.status] = (counts[v.status] || 0) + 1;
  }));
  const sum = document.getElementById('summary');
  const label = view === 'archive' ? '封存 Archived' : '案件 Cases';
  const parts = [`<span class="chip total"><span class="num">${scoped.length}</span> ${label}</span>`];
  STATUSES.forEach(s => {
    parts.push(`<span class="chip ${s.cls}"><span class="num">${counts[s.id]}</span> ${escapeHtml(s.label)}</span>`);
  });
  sum.innerHTML = parts.join('');

  document.getElementById('count-active').textContent  = rows.filter(r => !r.archived).length;
  document.getElementById('count-archive').textContent = rows.filter(r =>  r.archived).length;
}

function visibleRows() {
  let list = rows.filter(r => view === 'archive' ? r.archived : !r.archived);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    list = list.filter(r =>
      ['case','client','product','model','sales','country','note']
        .some(k => String(r[k]||'').toLowerCase().includes(t))
    );
  }
  if (statusFilter) {
    list = list.filter(r =>
      TEST_COLS.some(c => r.cells[c.key] && r.cells[c.key].status === statusFilter)
    );
  }
  if (itemFilter && statusFilter) {
    list = list.filter(r => r.cells[itemFilter] && r.cells[itemFilter].status === statusFilter);
  } else if (itemFilter) {
    list = list.filter(r => r.cells[itemFilter] && r.cells[itemFilter].status);
  }
  if (sortKey) {
    list.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (sortKey === 'no') { av = +av||0; bv = +bv||0; }
      else { av = String(av||'').toLowerCase(); bv = String(bv||'').toLowerCase(); }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ?  1 : -1;
      return 0;
    });
  }
  return list;
}

function render() {
  renderLegend();
  renderHead();
  renderSummary();
  renderFilters();

  const tbody = document.getElementById('tbody');
  const list = visibleRows();
  const totalCols = META_COLS.length + TEST_COLS.length + 1;
  if (!list.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${totalCols}">沒有符合的紀錄 — 試試調整搜尋或篩選 · No matching records</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => {
    const metaCells = META_COLS.map(col => {
      const cls = col.cls || '';
      const text = escapeHtml(r[col.key] == null ? '' : r[col.key]);
      if (col.edit) {
        return `<td class="${cls} editable" contenteditable="true"
                    data-no="${r.no}" data-key="${col.key}">${text}</td>`;
      }
      return `<td class="${cls}">${text}</td>`;
    }).join('');
    const testCells = TEST_COLS.map(col => {
      const cell = r.cells[col.key];
      const cls = cellClass(cell);
      const label = escapeHtml(cellLabel(cell));
      return `<td class="test-cell" data-no="${r.no}" data-key="${col.key}">
        <span class="pill ${cls}">${label}</span>
      </td>`;
    }).join('');
    const archiveBtn = r.archived
      ? `<button class="row-btn restore" data-act="restore" data-no="${r.no}" title="還原 Restore">還原</button>`
      : `<button class="row-btn archive" data-act="archive" data-no="${r.no}" title="封存 Archive">封存</button>`;
    const action = `<td class="col-action">${archiveBtn}<button class="row-btn del" data-act="del" data-no="${r.no}" title="刪除 Delete">刪除</button></td>`;
    return `<tr data-no="${r.no}">${metaCells}${testCells}${action}</tr>`;
  }).join('');

  bindRowEvents();
}

function bindRowEvents() {
  document.querySelectorAll('td.editable').forEach(td => {
    td.addEventListener('blur', () => {
      const no  = +td.dataset.no;
      const key = td.dataset.key;
      const r = rows.find(x => x.no === no); if (!r) return;
      const val = td.innerText.replace(/^\s+|\s+$/g,'');
      if (r[key] !== val) { r[key] = val; dbUpsert(r); }
    });
    td.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && td.dataset.key !== 'note') {
        e.preventDefault(); td.blur();
      }
    });
  });
  document.querySelectorAll('td.test-cell').forEach(td => {
    td.addEventListener('click', e => openStatusPop(td, e));
  });
  document.querySelectorAll('.row-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const no  = +btn.dataset.no;
      const act = btn.dataset.act;
      const r = rows.find(x => x.no === no); if (!r) return;
      btn.disabled = true;
      try {
        if (act === 'archive') {
          if (!confirm(`封存案號 ${r.case || '(未命名)'}？該專案會移到「封存」頁。\nArchive this project? It will move to the Archive tab.`)) return;
          r.archived = true;
          const res = await dbUpsert(r);
          if (!res.ok) { r.archived = false; render(); return; }
          render();
        } else if (act === 'restore') {
          r.archived = false;
          const res = await dbUpsert(r);
          if (!res.ok) { r.archived = true; render(); return; }
          render();
        } else if (act === 'del') {
          if (!confirm('確定要永久刪除這筆紀錄嗎？此操作無法復原。\nPermanently delete this row? This cannot be undone.')) return;
          /* Wait for the DB to confirm the row is gone before touching local state.
             If RLS or anything else blocks the delete, the row stays on screen. */
          const res = await dbDelete(r.id);
          if (!res.ok) return;
          rows = rows.filter(x => x.no !== no);
          render();
        }
      } finally {
        btn.disabled = false;
      }
    });
  });
}

/* ============================================================
   Status popover for test cells
   ============================================================ */
function openStatusPop(td, evt) {
  closeStatusPop();
  const no  = +td.dataset.no;
  const key = td.dataset.key;
  const r = rows.find(x => x.no === no); if (!r) return;
  const current = r.cells[key] || null;

  const mask = document.createElement('div');
  mask.className = 'pop-mask';
  mask.addEventListener('click', closeStatusPop);

  const pop = document.createElement('div');
  pop.className = 'pop';
  pop.innerHTML = `
    <h4>${escapeHtml(TEST_COLS.find(c=>c.key===key).zh)} · 設定狀態 Set Status</h4>
    <div class="pop-grid">
      ${STATUSES.map(s =>
        `<button class="${s.cls}${current && current.status===s.id ? ' current' : ''}" data-status="${s.id}">${escapeHtml(s.label)}</button>`
      ).join('')}
      <button class="clear" data-status="">清除 Clear</button>
    </div>
  `;
  document.body.appendChild(mask);
  document.body.appendChild(pop);

  const rect = td.getBoundingClientRect();
  const popW = 220, popH = pop.offsetHeight || 180;
  let left = rect.left + window.scrollX;
  let top  = rect.bottom + window.scrollY + 4;
  if (left + popW > window.scrollX + document.documentElement.clientWidth - 8)
    left = window.scrollX + document.documentElement.clientWidth - popW - 8;
  if (top + popH > window.scrollY + window.innerHeight - 8)
    top = rect.top + window.scrollY - popH - 4;
  pop.style.left = left + 'px';
  pop.style.top  = top + 'px';

  pop.querySelectorAll('.pop-grid button').forEach(btn => {
    btn.addEventListener('click', () => {
      const sid = btn.dataset.status;
      r.cells[key] = sid ? { status: sid } : null;
      dbUpsert(r); closeStatusPop(); render();
    });
  });
}
function closeStatusPop() {
  document.querySelectorAll('.pop, .pop-mask').forEach(el => el.remove());
}

/* ============================================================
   Toolbar
   ============================================================ */
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim(); render();
});
document.getElementById('status-filter').addEventListener('change', e => {
  statusFilter = e.target.value; render();
});
document.getElementById('item-filter').addEventListener('change', e => {
  itemFilter = e.target.value; render();
});
document.getElementById('add-row').addEventListener('click', () => {
  if (view !== 'active') view = 'active';
  const newRow = {
    id: crypto.randomUUID(),
    no: nextNo(), case:'', client:'', product:'', model:'', sales:'',
    sample:'', country:'', note:'', cells:{}, archived:false
  };
  rows.push(newRow);
  dbUpsert(newRow);
  render();
  setTimeout(() => {
    const wrap = document.querySelector('.table-wrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }, 30);
});

/* Tab switching */
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab'); if (!tab) return;
  const next = tab.dataset.view;
  if (!next || next === view) return;
  view = next;
  document.querySelectorAll('#tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  render();
});

/* ---------- CSV ---------- */
function csvCell(v) {
  const s = v == null ? '' : String(v);
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function cellToCsv(cell) {
  if (!cell || !cell.status) return '';
  return statusById(cell.status)?.label || '';
}
function toCSV() {
  const header = [
    ...META_COLS.map(c => `${c.zh}`),
    ...TEST_COLS.map(c => c.zh)
  ].map(csvCell).join(',');
  const lines = rows.map(r => {
    const meta = META_COLS.map(c => csvCell(r[c.key]));
    const test = TEST_COLS.map(c => csvCell(cellToCsv(r.cells[c.key])));
    return [...meta, ...test].join(',');
  });
  return [header, ...lines].join('\r\n');
}
function parseCSV(text) {
  const rowsP = []; let f = '', row = [], inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { f += '"'; i += 2; continue; }
      if (c === '"') { inQ = false; i++; continue; }
      f += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(f); f = ''; i++; continue; }
    if (c === '\r') { i++; continue; }
    if (c === '\n') { row.push(f); f = ''; rowsP.push(row); row = []; i++; continue; }
    f += c; i++;
  }
  if (f !== '' || row.length) { row.push(f); rowsP.push(row); }
  return rowsP;
}
function csvLabelToStatus(label) {
  const t = String(label||'').trim();
  if (!t) return null;
  const s = STATUSES.find(s => s.label === t || s.en === t || s.id === t);
  return s ? { status: s.id } : null;
}
document.getElementById('export-csv').addEventListener('click', () => {
  const csv = '﻿' + toCSV();
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `sporton_tracker_${ts}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 80);
});
document.getElementById('import-csv').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      let txt = ev.target.result;
      if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1);
      const grid = parseCSV(txt);
      if (grid.length < 2) { alert('CSV 缺少資料 No data found.'); return; }
      grid.shift(); // header
      const fresh = grid.filter(r => r.some(v => v && v.trim() !== ''))
        .map((r, idx) => {
          const obj = { no: idx + 1, cells: {}, archived: false };
          META_COLS.forEach((c, ci) => { obj[c.key] = (r[ci] || '').trim(); });
          TEST_COLS.forEach((c, ti) => {
            const raw = r[META_COLS.length + ti];
            obj.cells[c.key] = csvLabelToStatus(raw);
          });
          if (!obj.no) obj.no = idx + 1;
          return obj;
        });
      if (!fresh.length) { alert('CSV 沒有可匯入的列 No importable rows.'); return; }
      if (!confirm(`即將匯入 ${fresh.length} 筆，會覆蓋目前清單。\nImport ${fresh.length} rows? This replaces current data.`)) return;
      const saved = await dbReplaceAll(fresh);
      rows = normalize(saved);
      render();
    } catch (err) { alert('匯入失敗 Import failed: ' + err.message); }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
});

/* ---------- ESC closes popover ---------- */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeStatusPop();
});

/* ---------- boot ---------- */
async function init() {
  const totalCols = META_COLS.length + TEST_COLS.length + 1;
  document.getElementById('tbody').innerHTML =
    `<tr class="empty-row"><td colspan="${totalCols}">⏳ 載入中 Loading from Supabase…</td></tr>`;

  const raw = await dbLoad();

  /* IMPORTANT: only seed the sample data ONCE, ever — tracked in localStorage.
     Without this gate, deleting all rows + refresh would re-create the 5
     sample cases every time, making it look like deletes never persisted. */
  const SEEDED_KEY = 'sporton_tracker_seeded_v1';
  const hasSeeded = localStorage.getItem(SEEDED_KEY) === '1';

  if (!raw.length && !hasSeeded) {
    /* First-ever run: seed with the 5 Excel cases. */
    const seed = JSON.parse(JSON.stringify(SAMPLE)).map(r => ({ ...r, id: crypto.randomUUID() }));
    const { data, error } = await db.from('projects').insert(seed.map(toDb)).select();
    if (error) {
      reportDbError('INSERT (seed)', error);
      rows = [];
    } else {
      rows = normalize(data || seed);
      localStorage.setItem(SEEDED_KEY, '1');
    }
  } else {
    rows = normalize(raw);
    /* If the DB already had rows when we got here, mark seeded so we never
       try to re-seed even after the user deletes everything later. */
    if (raw.length) localStorage.setItem(SEEDED_KEY, '1');
  }

  render();
}

init();
</script>
